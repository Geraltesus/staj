services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  app:
    build: .
    container_name: helpdesk_app
    depends_on:
      - ollama
    volumes:
      - .:/app
    working_dir: /app
    command: python main.py
    restart: "no"

volumes:
  ollama_data: